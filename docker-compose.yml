services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage

  hayhooks:
    build:
      context: .
      dockerfile: services/hayhooks/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
      HAYHOOKS_HOST: 0.0.0.0
      HAYHOOKS_PORT: 1416
      HAYHOOKS_PIPELINES_DIR: /app/config/pipelines
      HAYHOOKS_ADDITIONAL_PYTHON_PATH: /app/src
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    depends_on:
      - qdrant
    ports:
      - "1416:1416"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./src:/app/src
    command: ["bash", "/app/scripts/start-hayhooks.sh"]

  hayhooks-mcp:
    build:
      context: .
      dockerfile: services/hayhooks/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
      HAYHOOKS_PIPELINES_DIR: /app/config/pipelines
      HAYHOOKS_ADDITIONAL_PYTHON_PATH: /app/src
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    depends_on:
      - qdrant
    ports:
      - "1417:1417"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./src:/app/src
    command: ["bash", "/app/scripts/start-hayhooks-mcp.sh"]

  ingestion:
    build:
      context: .
      dockerfile: services/hayhooks/Dockerfile
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    depends_on:
      - qdrant
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ${HOST_SOURCE_DOCS_DIR:-/home/as/Документы/RAG_DOCS}:${SOURCE_DOCS_DIR:-/documents/rag_docs}:ro
    command:
      - python
      - -m
      - haystack_rag.ingestion.index_documents
      - --input-dir
      - ${SOURCE_DOCS_DIR:-/documents/rag_docs}

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    environment:
      WEBUI_AUTH: "False"
      ENABLE_OPENAI_API: "True"
      OPENAI_API_BASE_URL: http://hayhooks:1416/v1
      OPENAI_API_KEY: not-needed
      DEFAULT_MODELS: doc_search
    depends_on:
      - hayhooks
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data

volumes:
  open-webui-data:
